name: GitHub Release

permissions:
  contents: write

on:
  workflow_run:
    workflows:
      - Python Tests
    branches:
      - main
    types:
      - completed

concurrency:
  group: github-release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve release name from app version
        id: version
        shell: python
        run: |
          import os
          import re
          from pathlib import Path

          config_path = Path("dev/abhishekraha/secretmanager/config/SecretManagerConfig.py")
          config_text = config_path.read_text(encoding="utf-8")
          version_match = re.search(r'APP_VERSION\s*=\s*"v?([^"]+)"', config_text)
          if not version_match:
              raise SystemExit("APP_VERSION was not found in SecretManagerConfig.py")

          version = version_match.group(1)
          release_name = f"v{version}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as github_output:
              github_output.write(f"version={version}\n")
              github_output.write(f"release_name={release_name}\n")

      - name: Ensure GitHub release exists
        id: release
        uses: actions/github-script@v8
        env:
          RELEASE_NAME: ${{ steps.version.outputs.release_name }}
          APP_VERSION: v${{ steps.version.outputs.version }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          script: |
            const tag = process.env.RELEASE_NAME;
            try {
              const existingRelease = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.setOutput("release_name", tag);
              core.setOutput("release_id", String(existingRelease.data.id));
              core.setOutput("created", "false");
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              const createdRelease = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                target_commitish: process.env.TARGET_SHA,
                name: tag,
                generate_release_notes: true,
                draft: false,
                prerelease: false,
                body: [
                  `Automated release for Simple Credential Manager ${process.env.APP_VERSION}.`,
                  "",
                  `Release assets include Windows, Linux, and macOS packages with the launcher files needed for each platform.`,
                  `GitHub still provides generic source archives for the tag automatically.`,
                ].join("\n"),
              });

              core.setOutput("release_name", tag);
              core.setOutput("release_id", String(createdRelease.data.id));
              core.setOutput("created", "true");
            }

      - name: Build platform release packages
        run: python .github/scripts/build_release_packages.py --version "${{ steps.version.outputs.version }}"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.release.outputs.release_name }}" dist/* --clobber
