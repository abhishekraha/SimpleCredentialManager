name: GitHub Release

permissions:
  contents: write

on:
  workflow_run:
    workflows:
      - Python Tests
    types:
      - completed

concurrency:
  group: github-release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve release name from app version
        id: version
        shell: python
        run: |
          import os
          import re
          from pathlib import Path

          config_path = Path("dev/abhishekraha/secretmanager/config/SecretManagerConfig.py")
          config_text = config_path.read_text(encoding="utf-8")
          version_match = re.search(r'APP_VERSION\s*=\s*"v?([^"]+)"', config_text)
          if not version_match:
              raise SystemExit("APP_VERSION was not found in SecretManagerConfig.py")

          version = version_match.group(1)
          release_name = f"SimpleCredentialManager.v{version}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as github_output:
              github_output.write(f"version={version}\n")
              github_output.write(f"release_name={release_name}\n")

      - name: Check whether release already exists
        id: release_check
        uses: actions/github-script@v7
        env:
          RELEASE_NAME: ${{ steps.version.outputs.release_name }}
        with:
          script: |
            const tag = process.env.RELEASE_NAME;
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.setOutput("exists", "true");
            } catch (error) {
              if (error.status === 404) {
                core.setOutput("exists", "false");
                return;
              }
              throw error;
            }

      - name: Create GitHub release
        if: steps.release_check.outputs.exists != 'true'
        uses: actions/github-script@v7
        env:
          RELEASE_NAME: ${{ steps.version.outputs.release_name }}
          APP_VERSION: v${{ steps.version.outputs.version }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          script: |
            const tag = process.env.RELEASE_NAME;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: process.env.TARGET_SHA,
              name: tag,
              generate_release_notes: true,
              draft: false,
              prerelease: false,
              body: [
                `Automated release for Simple Credential Manager ${process.env.APP_VERSION}.`,
                "",
                `GitHub automatically provides the source code ZIP archive for this tag.`,
              ].join("\n"),
            });

      - name: Skip existing release
        if: steps.release_check.outputs.exists == 'true'
        run: echo "Release already exists for ${{ steps.version.outputs.release_name }}."
